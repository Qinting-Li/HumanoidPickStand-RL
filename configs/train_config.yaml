# PPO Training Configuration
algorithm: PPO

# Environment
env:
  scene_xml: "assets/scene.xml"
  max_episode_steps: 2000
  control_dt: 0.02         # 50 Hz control
  sim_dt: 0.002            # 500 Hz physics
  action_scale: 1.0

# Object
object:
  mass: 0.5                # kg
  size: [0.04, 0.04, 0.04] # box half-sizes in meters
  init_pos: [0.35, 0.0, 0.04]

# Phase durations (in steps at 50Hz)
phases:
  stand_steps: 50
  squat_target_height: 0.50   # pelvis height for squatting (m)
  reach_threshold: 0.05       # hand-object distance threshold (m)
  grasp_hold_steps: 30        # steps to hold grasp before standing
  standup_target_height: 0.85 # pelvis height for standing (m)

# Reward weights
reward:
  alive: 1.0
  balance: 3.0
  phase_progress: 5.0
  hand_reach: 2.0
  grasp: 4.0
  standup: 5.0
  energy_penalty: 0.001
  action_rate_penalty: 0.01
  joint_limit_penalty: 0.5
  orientation_penalty: 2.0

# PPO hyperparameters
ppo:
  learning_rate: 3.0e-4
  n_steps: 4096
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 50_000_000
  n_envs: 8

# Logging
logging:
  log_dir: "logs"
  save_freq: 500_000
  eval_freq: 100_000
  eval_episodes: 5
  tensorboard_log: "logs/tensorboard"
